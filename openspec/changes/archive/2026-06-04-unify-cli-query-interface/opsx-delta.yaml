schema_version: 1
ADDED:
  capabilities:
    - id: cap.cli.opsx-query
      type: capability
      intent: 查询 OPSX 节点信息、关系和 code-map 引用的 CLI 命令
  relations:
    - from: cap.cli.opsx-query
      to: dom.cli
      type: contains
    - from: cap.cli.opsx-query
      to: cap.opsx.read-transparent
      type: depends_on

MODIFIED:
  capabilities:
    - id: cap.cli.list
      intent: 列出变更或 specs，specs 模式支持 JSON 输出包含 capabilities 字段
    - id: cap.cli.spec
      intent: 使用 show 和 validate 子命令管理和查看 OpenSpec 规约；list 功能已迁移到 openspec list --specs
    - id: cap.ai.impact-sweeper
      intent: 通过 CLI 查询接口获取 OPSX 数据和 cap→spec 映射，生成影响面报告
    - id: cap.ai.workflow-templates
      intent: 提供 AI workflow 模板，使用统一 CLI 查询接口（openspec list --specs）

REMOVED:
  capabilities: []
