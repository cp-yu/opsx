schema_version: 1
ADDED: {}
MODIFIED:
  capabilities:
    - id: cap.apply.task-decomposition
      intent: Apply 阶段 Master agent 将粗粒度任务拆解为 bounded TDD 步骤；超过 5 个 cycles 时自动拆为多个 step file 或 batch；普通拆解失败进入 master-led recovery，只有同一 task 的同一 normalized error signature 经 remediation 后连续失败 2 次才 pause。
    - id: cap.apply.implementer-subagent
      intent: Implementer subagent 机械执行详细 TDD 步骤，并将 BLOCKED / NEEDS_CONTEXT 作为结构化 coordinator feedback 返回；输出 task、cycle、step、command、failure kind、error summary 以支持 master 判断错误是否重复。
    - id: cap.apply.branch-isolation
      intent: Apply 阶段分支隔离策略由 apply.defaultIsolation 驱动；main/master 上仅 ask 模式询问用户，branch/worktree/none 配置直接执行并持久化 .apply-isolation.json。
    - id: cap.apply.verify-integration
      intent: apply 命令内置 Phase 1 一致性验证、Phase 2 优化循环和 Phase 3 seal；Phase 1 或 seal failure 写回 remediation 后进入同一 recovery loop，不因首次失败直接 pause。
REMOVED: {}
