schema_version: 1
ADDED:
  relations:
    - from: cap.cli.update
      type: depends_on
      to: cap.config.project
    - from: cap.cli.update
      type: depends_on
      to: cap.config.migration

MODIFIED:
  capabilities:
    - id: cap.cli.init
      intent: 在项目中初始化 OpenSpec 并生成按 profile 选择的工具制品；首次 init 自动生成 OPSX 骨架文件，并创建包含 schema、optimization 与 git 功能性默认值的 openspec/config.yaml。
    - id: cap.cli.update
      intent: 刷新 OpenSpec 指令文件并重新生成已配置 AI 工具的制品；同时对 openspec/config.yaml 或 config.yml 执行非覆盖项目配置默认值迁移，补齐 optimization 与 git 功能性默认节点。
    - id: cap.config.project
      intent: 加载、验证、合并并物化项目级配置 openspec/config.yaml；将有效字段暴露为 prompt/runtime projection 的统一输入，并为 init/update 提供 optimization 与 git 的共享磁盘默认值。
    - id: cap.config.migration
      intent: 处理配置格式迁移和向后兼容，包括全局 profile 迁移与项目 config.yaml/config.yml 的非覆盖默认值补齐。

REMOVED: {}
