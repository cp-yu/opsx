schema_version: 1

ADDED:
  capabilities:
    - id: cap.archive.branch-merge
      type: capability
      intent: 归档时按结构化 commit message 把 feature 分支合并回 originalBranch；merge 策略与是否删除分支由 openspec/config.yaml 的 git 节点配置控制；merge message 默认从 proposal/design/tasks 生成，遵循 git-commit-reasons 模板；冲突时 abort 并保留 archive commit
      status: active
  relations:
    - from: cap.archive.branch-merge
      type: contains
      to: dom.change-workflow
    - from: cap.archive.branch-merge
      type: depends_on
      to: cap.apply.branch-isolation
    - from: cap.archive.branch-merge
      type: depends_on
      to: cap.change.archive
    - from: cap.archive.branch-merge
      type: depends_on
      to: cap.config.project

MODIFIED:
  capabilities:
    - id: cap.change.archive
      intent: 归档已完成的变更，将规约合并到主目录并移动变更到 archive；归档末尾追加 archive commit、merge to originalBranch、可选 branch cleanup 三步，行为受 git 配置节点约束。archive 入口校验从 AI 文本指令迁移为 CLI 工具调用（openspec verify status），增加 verify + sync 双重门禁联合校验。不通过时合并询问用户如何操作
    - id: cap.config.project
      intent: 加载和验证项目级配置（openspec/config.yaml），并将有效字段暴露为可供 prompt projection 与 runtime projection 共同消费的统一输入；新增 git 节点（merge.strategy、merge.messageFrom、branch.deleteAfterArchive）支持归档分支合并策略配置
    - id: cap.ai.reviewer-skill
      intent: Phase 1 验证审查 subagent skill。Reviewer 自主读取文件和执行测试，Input Contract 从 5 字段 bundle 简化为 3 字段定位信息（changeName、changeDir、projectRoot）。Scope 锚定改为 git diff <originalBranch>...HEAD --name-only，判断证据仅基于 Read 到的最终磁盘内容，不再使用 diff 内容；保留 6步验证循环、严重性阈值、三个验证维度和结构化输出 schema
    - id: cap.ai.optimizer-skill
      intent: Phase 2 优化提案 subagent skill。Optimizer 自主从 .verify-result.json 读取 Phase 1 结果和 evidence 列表，Input Contract 从 7 字段 bundle 简化为 3 字段定位信息。Scope 锚定改为 git diff <originalBranch>...HEAD --name-only，并新增一层依赖展开协议（imports/callers/OPSX relations）扩大优化候选；展开候选不进入 affectedFileHashes 也不作为 patch 目标。保留 5类优化原则、Search/Replace 块输出格式和 failedDirections 避重协议
