schema_version: 1

ADDED:
  capabilities:
    - id: cap.verify.cli-gate
      type: capability
      intent: 程序化 verify 门禁 CLI 工具，为 Phase 1/Phase 2/sync/archive 提供入口条件校验、JSON 输入接受、结果写回和下一步指令输出
      status: active

    - id: cap.verify.freshness-engine
      type: capability
      intent: 确定性 freshness 判定引擎，用 TypeScript 代码实现 tasksFileHash、evidenceFingerprint 计算和 FRESH/STALE/MISSING 判定，替代 AI 文本指令的手动计算
      status: active

  relations:
    - from: cap.verify.cli-gate
      to: dom.verify
      type: contains

    - from: cap.verify.freshness-engine
      to: dom.verify
      type: contains

    - from: cap.verify.cli-gate
      to: cap.verify.freshness-engine
      type: depends_on

    - from: cap.change.archive
      to: cap.verify.cli-gate
      type: depends_on

    - from: cap.change.specs-sync
      to: cap.verify.cli-gate
      type: depends_on

MODIFIED:
  capabilities:
    - id: cap.verify.optimize
      type: capability
      intent: 在一致性检验通过后，对代码进行最优性检验——诊断代码质量、设计模式、效率维度，生成 Search/Replace 块供主 agent 在 checkpoint 保护下应用。Phase 2 通过 CLI 双调用机制强制执行：agent 必须分别调用 --type=optimization 和 --type=verification 完成优化提交和 speculative fence 验证。新增 PENDING_VERIFICATION 中间状态追踪双调用间的状态转换
      status: active

    - id: cap.change.archive
      type: capability
      intent: 归档已完成的变更，将规约合并到主目录并移动变更到 archive。archive 入口校验从 AI 文本指令迁移为 CLI 工具调用（openspec verify status），增加 verify + sync 双重门禁联合校验。不通过时合并询问用户如何操作
      status: active

    - id: cap.change.specs-sync
      type: capability
      intent: 将变更中的 delta specs 和 OPSX delta 同步到主规约与主 OPSX。core 模式下改为调用 openspec sync CLI 工具（而非手动内联 sync）。sync 执行前增加 verify gate 入口校验
      status: active

    - id: cap.ai.workflow-templates
      type: capability
      intent: 提供面向 Agent 的工作流模板。verify 模板中 Step 8-11 替换为 openspec verify CLI 调用指令；archive 模板中 Step 2 freshness 检查替换为 CLI 调用，Step 5 改为调用 openspec sync CLI 工具
      status: active
