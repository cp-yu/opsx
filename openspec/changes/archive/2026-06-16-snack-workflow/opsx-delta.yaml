schema_version: 1
ADDED:
  capabilities:
    - id: cap.ai.snack-skill
      type: capability
      intent: snack skill 提供代码优先的轻量级同步工作流，从 git diff 自动生成 specs 和 OPSX delta，支持多次调用更新同一 change
      status: active
    - id: cap.ai.snack-skill-generation
      type: capability
      intent: 将 snack skill 纳入 skill 生成管线，与现有 5 个核心工作流一致
      status: active
    - id: cap.ai.snack-workflow-manifest
      type: capability
      intent: 在 WorkflowManifestRegistry 中注册 snack 工作流，使其成为第 6 个核心工作流
      status: active
  relations:
    - from: cap.ai.snack-skill
      type: contains
      to: dom.ai-integration
    - from: cap.ai.snack-skill-generation
      type: contains
      to: dom.ai-integration
    - from: cap.ai.snack-workflow-manifest
      type: contains
      to: dom.ai-integration
    - from: cap.ai.snack-skill-generation
      type: depends_on
      to: cap.ai.template-artifact-pipeline
    - from: cap.ai.snack-workflow-manifest
      type: depends_on
      to: cap.ai.template-artifact-pipeline

MODIFIED:
  capabilities:
    - id: cap.ai.template-artifact-pipeline
      intent: 统一的 artifact 生成管线，基于固定的 6 个工作流 manifest entries 生成制品，modeMembership 作为标签系统而非 profile 过滤条件
    - id: cap.ai.workflow-templates
      intent: 提供 6 个核心工作流的 AI workflow 模板（propose, explore, apply, archive, bootstrap-opsx, snack）
