schema_version: 1
MODIFIED:
  capabilities:
    - id: cap.ai.explore-brainstorming
      type: capability
      intent: Explore 阶段的 brainstorming 流程，包含 6 步 checklist、一次一问纪律、2-3 方案对比、Design Summary 生成；main explore agent 严格 read-only，用户设计确认不构成文件写入授权；已有 change 的 insight 仅分类为 future capture target，不在 explore 中更新 artifacts；superpowers 风格行为引导（对话姿态、动作空间、入口点示例、收束模板）通过 referenceFiles 暴露为展开版手册，与只读边界与 propose 路由保持一致
