schema_version: 1
project:
  id: proj.openspec
  name: OpenSpec
  intent: AI 原生的规约驱动开发系统。在人类意图与 AI 代码生成之间提供轻量级规约层， 确保代码编写前的意图对齐。
  scope: 覆盖 OpenSpec CLI（@fission-ai/openspec v1.x）、其规约引擎、 变更工作流系统、Schema 系统和 AI 工具集成。 不覆盖使用 OpenSpec 的下游项目。
  roots:
    - path: .
domains:
  - id: dom.cli
    intent: 命令行界面，将所有 OpenSpec 操作暴露为可组合的子命令
    type: domain
    boundary: 拥有终端 I/O 和命令路由。将所有领域逻辑委托给核心模块。
  - id: dom.artifact-graph
    intent: 制品依赖解析、拓扑排序和指令组装的核心引擎
    type: domain
    boundary: 拥有图解析和指令加载。不拥有 CLI 输出格式化或技能编排。
  - id: dom.change-workflow
    intent: 管理完整变更生命周期 — 创建、增量规约操作、归档及合并到主规约
    type: domain
    boundary: 拥有变更目录和增量合并逻辑。不拥有规约内容验证规则。
  - id: dom.schema
    intent: 定义、解析和管理控制制品类型、依赖关系和构建顺序的工作流 Schema
    type: domain
    boundary: 拥有 Schema YAML 解析和三层解析逻辑。不拥有制品内容生成。
  - id: dom.ai-integration
    intent: 多工具 AI 支持 — 为 25+ AI 工具生成特定工具的技能文件、斜杠命令和面向 Agent 的工作流
    type: domain
    boundary: 拥有工具适配器注册表和技能定义。不拥有核心规约/变更逻辑。
  - id: dom.config
    intent: 项目级和用户级配置管理，带 Schema 验证
    type: domain
    boundary: 拥有配置加载、验证和合并。不拥有配置 UI 或交互式提示。
  - id: dom.validation
    intent: 变更、规约和 OPSX 完整性的验证系统
    type: domain
    boundary: 拥有验证规则和错误报告。不拥有修复建议或自动修复。
  - id: dom.opsx
    intent: OPSX 编程基础设施，用于架构追踪，包含 YAML 操作、验证和分片
    type: domain
    boundary: 拥有 OPSX 文件 I/O、Schema 验证和 delta 合并。不拥有 OPSX 内容生成。
  - id: dom.verify
    intent: 两阶段质量门禁——在一致性检验通过后，对代码进行最优性检验，将代码从"可用"提升到"精良"
    status: active
    type: domain
  - id: dom.apply
    intent: apply 命令作为编译步骤，集成实现、验证、优化的完整生命周期。确保 apply 输出即验证过的制品
    type: domain
capabilities:
  - id: cap.ai.agent-docs
    intent: 生成面向 Agent 的指令文档，并让所有会生成或回写 artifact 的 workflow surface 共享同一套配置投影合同
    status: active
    type: capability
  - id: cap.ai.command-generation
    intent: WorkflowManifestEntry.getCommandTemplate 改为 optional，命令生成管线跳过 skill-only 条目；内部 skill 不暴露为可用命令或出现在补全列表中
    status: active
    type: capability
  - id: cap.ai.command-slugs
    intent: 建立内部 workflow ID 到外部用户命令 slug 的映射，使生成、检测、迁移和清理命令制品时都遵循同一套命名契约
    type: capability
  - id: cap.ai.skill-generation
    intent: 为配置的 AI 工具生成特定工具的技能文件，并在写入 skill 指令时按工具渲染用户可见 workflow 引用；其中 Codex 使用精确的 `$openspec-*` skill 名称
    status: active
    type: capability
  - id: cap.ai.template-artifact-pipeline
    intent: "统一的 artifact 生成管线，包含 WorkflowManifest、ToolProfileRegistry、transform 管线和 ArtifactSyncEngine。transform 管线的 scope: 'both' 语义现在对 skill 和 command 两种产出均实际生效——writeSkills 和 writeCommands 均在适配器格式化前调用 runTransforms 执行 preAdapter 阶段变换"
    type: capability
  - id: cap.ai.tool-adapters
    intent: 为支持的 AI 工具提供工具元数据与适配器注册；其中 Codex 通过显式工具元数据声明为 skills-only，不再注册 command adapter
    status: active
    type: capability
  - id: cap.ai.workflow-templates
    intent: verify/apply/archive/propose 等模板共享面向 Agent 的 workflow guidance；propose 的 post-propose warning validation 包含程序化 Actions/Checks 结构校验，并避免大语言模型语义判断。
    type: capability
  - id: cap.artifact-graph.instruction-loader
    intent: 加载 Schema 模板，并按 workflow surface 与 artifact 编译项目配置投影，向 AI 暴露统一的 prompt projection 而非原始字段拼接结果
    status: active
    type: capability
  - id: cap.artifact-graph.parse
    intent: 解析制品依赖关系并构建 DAG，支持循环检测和拓扑排序
    status: active
    type: capability
  - id: cap.artifact-graph.schema-resolution
    intent: 解析和验证制品 Schema 定义
    status: active
    type: capability
  - id: cap.artifact-graph.state-tracking
    intent: 通过文件系统追踪制品完成状态
    status: active
    type: capability
  - id: cap.change.archive
    intent: 归档已完成的变更，将规约合并到主目录并移动变更到 archive。archive 入口校验从 AI 文本指令迁移为 CLI 工具调用（openspec verify status），增加 verify + sync 双重门禁联合校验。不通过时合并询问用户如何操作
    status: active
    type: capability
  - id: cap.change.create
    intent: 创建新的变更目录，包含提案、规约、设计和任务文件
    status: active
    type: capability
  - id: cap.change.discovery
    intent: 发现和列举项目中的变更和规约
    status: active
    type: capability
  - id: cap.change.metadata
    intent: 管理变更元数据（创建时间、状态、描述）
    status: active
    type: capability
  - id: cap.change.specs-sync
    intent: 将变更中的 delta specs 和 OPSX delta 同步到主规约与主 OPSX。core 模式下改为调用 openspec sync CLI 工具（而非手动内联 sync）。sync 执行前增加 verify gate 入口校验
    status: active
    type: capability
  - id: cap.cli.archive
    intent: 归档已完成的变更并将规约合并到主规约目录，同时让 embedded sync 的正文生成行为与统一 runtime projection 保持一致
    status: active
    type: capability
  - id: cap.cli.change
    intent: 管理变更提案，包含创建、列表和操作的子命令
    status: active
    type: capability
  - id: cap.cli.completion
    intent: 管理 OpenSpec CLI 的 shell 补全，COMMAND_REGISTRY 现已包含 verify 命令及其子命令 phase1、phase2、seal、status
    type: capability
  - id: cap.cli.config
    intent: 查看和修改全局 OpenSpec 配置
    status: active
    type: capability
  - id: cap.cli.feedback
    intent: 提交关于 OpenSpec 的反馈
    status: active
    type: capability
  - id: cap.cli.init
    intent: 在项目中初始化 OpenSpec 并生成按 profile 选择的工具制品；首次 init 自动生成 OPSX 骨架文件并引导用户运行 bootstrap；成功输出与入门提示按工具表面渲染用户可见调用语法，Codex 使用 skills 引导而非 slash commands
    status: active
    type: capability
  - id: cap.cli.instructions
    intent: 输出用于创建制品或应用任务的丰富指令。apply 指令返回的 state 字段新增 needs_verify 和 needs_seal 取值
    status: active
    type: capability
  - id: cap.cli.list
    intent: 列出变更或规约，支持过滤、JSON 输出和 verifyStatus 字段
    status: active
    type: capability
  - id: cap.cli.new-change
    intent: 创建新的变更目录
    status: active
    type: capability
  - id: cap.cli.schema
    intent: 管理工作流 Schema，包含 init、fork 和 which 子命令
    status: active
    type: capability
  - id: cap.cli.schemas
    intent: 列出可用的工作流 Schema 及其描述
    status: active
    type: capability
  - id: cap.cli.show
    intent: 显示变更或规约的详细信息
    status: active
    type: capability
  - id: cap.cli.spec
    intent: 使用子命令管理和查看 OpenSpec 规约
    status: active
    type: capability
  - id: cap.cli.status
    intent: 显示变更的制品完成状态
    status: active
    type: capability
  - id: cap.cli.templates
    intent: 显示 Schema 中所有制品的已解析模板路径
    status: active
    type: capability
  - id: cap.cli.update
    intent: 刷新 OpenSpec 指令文件并重新生成已配置 AI 工具的制品；刷新后的 onboarding 与 restart 提示按工具表面渲染用户可见调用语法，Codex 不再使用 slash-command 叙事
    status: active
    type: capability
  - id: cap.cli.validate
    intent: 验证变更和规约的完整性
    status: active
    type: capability
  - id: cap.cli.view
    intent: 显示规约和变更的交互式仪表板，task 全部完成的分类标签改为 "Tasks Done"
    status: active
    type: capability
  - id: cap.config.global
    intent: 加载和验证用户全局配置（~/.config/openspec/）
    status: active
    type: capability
  - id: cap.config.migration
    intent: 处理配置格式迁移和向后兼容
    status: active
    type: capability
  - id: cap.config.project
    intent: 加载和验证项目级配置（openspec/config.yaml），并将有效字段暴露为可供 prompt projection 与 runtime projection 共同消费的统一输入
    status: active
    type: capability
  - id: cap.config.schema-validation
    intent: 使用 Zod Schema 验证配置结构
    status: active
    type: capability
  - id: cap.opsx.atomic-write
    intent: 使用临时文件 + 重命名模式实现原子写入
    status: active
    type: capability
  - id: cap.opsx.bootstrap
    intent: 提供基于现有 CLI 的 bootstrap 工作流，支持 TTY 模式选择、invalid domain-map 诊断、gate 驱动的五阶段生命周期，以及对 retained workspace 的显式 completed/restart 语义；promote 后保留工作区并通过显式 restart 路径开启下一轮 run
    status: active
    type: capability
  - id: cap.opsx.delta-merge
    intent: 将 opsx-delta.yaml 合并到主 OPSX 文件，支持 ADDED/MODIFIED/REMOVED。MODIFIED section 执行 shallow merge，仅更新 delta 中显式声明的字段
    status: active
    type: capability
  - id: cap.opsx.read-transparent
    intent: 透明处理分片读取，自动合并多个分片文件
    status: active
    type: capability
  - id: cap.opsx.referential-integrity
    intent: 验证所有关系的 from/to 引用是否存在
    status: active
    type: capability
  - id: cap.opsx.sharding
    intent: 当文件超过 1000 行时按领域自动分片
    status: active
    type: capability
  - id: cap.opsx.spec-refs-validation
    intent: 验证 spec_refs 路径是否存在
    status: active
    type: capability
  - id: cap.opsx.yaml-operations
    intent: YAML 序列化/反序列化，支持注释保留和格式化
    status: active
    type: capability
  - id: cap.schema.fork
    intent: 从现有 Schema 创建分支
    status: active
    type: capability
  - id: cap.schema.init
    intent: 初始化新的工作流 Schema
    status: active
    type: capability
  - id: cap.schema.parse
    intent: 解析工作流 Schema YAML 文件，支持三层解析（内置、项目、变更）
    status: active
    type: capability
  - id: cap.schema.validate
    intent: 验证 Schema 结构和制品依赖关系
    status: active
    type: capability
  - id: cap.validation.change
    intent: 验证变更的完整性和结构，包括 delta spec section-type 与主 spec header 存在性的交叉验证
    status: active
    type: capability
  - id: cap.validation.opsx
    intent: 验证 OPSX 引用完整性和双向对齐
    status: active
    type: capability
  - id: cap.validation.spec
    intent: 验证规约的格式和内容
    status: active
    type: capability
  - id: cap.cli.sync
    intent: 顶层 CLI 命令，将 change 中的 delta specs 和 OPSX delta 同步到主文件，不执行归档，并在需要生成正文时消费统一 runtime projection。sync 执行前增加 verify gate 入口校验，失败时输出增强诊断信息和补救操作指引。sync 完成后自动刷新 .verify-result.json evidence fingerprint
    status: active
    type: capability
  - id: cap.ai.verify-writeback
    intent: 验证结果回写 tasks.md（unmark 未真正完成的任务）并生成分类 remediation 清单（code_fix / artifact_fix），同时让 write-back prose 遵守统一 runtime projection
    status: active
    type: capability
  - id: cap.verify.optimize
    intent: 在一致性检验通过后，对代码进行最优性检验。Phase 2 MUST 始终 spawn optimizer subagent 至少一次，master agent MUST NOT 替代 optimizer 做判断。优化循环由 apply 模板主控，每次提案+补丁+验证循环消耗一次 config.optimization.optRetries（默认 2）配额。NO_OPTIMIZATION_NEEDED 仅在 optimizer subagent 明确返回 "No optimization opportunities found" 时允许，且 CLI 要求 summary 非空作为 runtime enforcement
    type: capability
  - id: cap.ai.tool-invocation-references
    intent: 基于共享 workflow surface 元数据渲染不同 AI 工具的用户可调用 workflow 引用，其中 Codex 使用精确的 `$openspec-*` skill 名称
    type: capability
  - id: cap.opsx.bootstrap-refresh
    intent: 为已有 formal OPSX 项目提供显式 refresh 生命周期，基于现有 OPSX、specs 与保留/快照后的 bootstrap 工作区生成可审查增量，并通过 merge/delta 安全更新正式 OPSX
    status: active
    type: capability
  - id: cap.verify.execution-model-selection
    intent: 为 verify / archive full verify 按 execution model 选择模板骨架；支持 clean-context subagent 的工具使用 orchestration-only verify skeleton，不支持的工具继续使用 current-agent-reread skeleton
    status: active
    type: capability
  - id: cap.verify.cli-gate
    intent: 程序化 verify 门禁 CLI 工具。Phase 2 双调用模型保留，但重试上限从硬编码 3 改为读取 config.optimization.optRetries，新增 failedDirections 记录支持
    type: capability
  - id: cap.verify.freshness-engine
    intent: 确定性 freshness 判定引擎，用 TypeScript 代码实现 tasksFileHash、evidenceFingerprint 计算和 FRESH/STALE/MISSING 判定。evidenceFingerprint 基于文件内容哈希（而非元数据）计算，消除文件系统触碰导致的误报 STALE。Phase 2 verification PASS 时重算 evidenceFingerprint，使其覆盖优化后的文件状态。STALE 判定时生成增强诊断细节（文件级指纹差异、git HEAD 对比），formatVerifyGateFailure 输出结构化可操作指引。新增 refreshVerifyEvidenceAfterSync 函数支持 sync 后增量刷新 evidence 哈希
    type: capability
  - id: cap.apply.verify-integration
    intent: apply 命令内置 Phase 1 一致性验证和 Phase 2 优化循环。模板对 needs_verify 状态直接进入 Phase 1，对 needs_seal 状态直接进入 Phase 2/3，不需用户手动触发
    type: capability
  - id: cap.apply.subagent-orchestration
    intent: apply 工作流中严格区分编码角色（主 agent）和判断角色（subagent reviewer/optimizer），保持关注点分离
    type: capability
  - id: cap.ai.agent-prompt-guidance
    intent: 面向 Agent 的 verify gate 提示词指引系统。VERIFY_SIMPLE_CHANGE_FAST_PATH 从"允许 master agent 自主跳过"改为"强制委托 optimizer subagent"语义。共享片段（状态机流程图、JSON schema 速查表、CLI 错误恢复决策树）中 OPTIMIZATION_PROPOSED 行补全 --files 参数，错误恢复增加 FILES_REQUIRED 条目。apply-change 模板 Phase 2 命令模板同步补全 --files
    type: capability
  - id: cap.cli.init-opsx-skeleton
    intent: init 命令首次运行时自动生成三个最小化 OPSX 骨架文件（project.opsx.yaml、project.opsx.relations.yaml、project.opsx.code-map.yaml），并在成功提示中显式引导用户运行 /opsx:bootstrap 完成架构映射
    status: active
    type: capability
  - id: cap.ai.reviewer-skill
    intent: Phase 1 验证审查 subagent skill。定义 reviewer 的角色、输入合约、6步验证循环、严重性阈值、证据标准、三个验证维度（completeness/correctness/coherence）、OPSX 对齐检查、结构化输出 schema 和边界降级策略
    type: capability
  - id: cap.ai.optimizer-skill
    intent: Phase 2 优化提案 subagent skill。定义 optimizer 的角色、输入合约、5类优化原则与禁止项、Search/Replace 块输出格式、failedDirections 避重协议和边界处理
    type: capability
  - id: cap.ai.internal-skill-installation
    intent: 内部 skill 安装管线。将 openspec-reviewer 和 openspec-optimizer 作为 core preset 的一部分，init/update 时安装到各 AI 工具的 skills 目录，不生成对应的 slash command
    type: capability
  - id: cap.verify.prompt-orchestration
    intent: Verification prompt orchestration patterns that enforce coordinator role discipline, phased mode labels, explicit subagent delegation instructions, and timeout/waiting rules across the verify workflow
    type: capability
  - id: cap.verify.enforce-optimizer-invocation
    intent: 强制 optimizer subagent 调用约束——CLI 层 runtime enforcement（summary 非空校验）+ prompt 层协议约束（VERIFY_SIMPLE_CHANGE_FAST_PATH 重写为强制委托语义），确保 Phase 2 判断权始终归属 optimizer subagent
    type: capability
  - id: cap.validation.spec-section-type-cross-check
    intent: 在 change delta spec 验证中增加 section-type 与主 spec header 存在性的交叉验证，确保 MODIFIED/REMOVED/RENAMED 引用的 header 存在于主 spec，ADDED 的 header 不存在于主 spec
    type: capability
  - id: cap.cli.verify-aware-instructions
    intent: instructions apply 命令在判定 change 完成状态时集成 verify freshness 检查，返回 needs_verify/needs_seal/all_done 三态而非仅基于 task checkbox
    type: capability
  - id: cap.sync.evidence-refresh
    intent: sync 完成后自动刷新 .verify-result.json 中与 sync 输出重叠的 evidence 文件哈希，使 verify freshness 判决不受合法 sync 写入的影响
    type: capability
